<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoLog | Log New Scrap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .form-card { background: white; border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #4a90e2; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; }
        .btn-primary:hover { background-color: #357abd; }
        label { font-weight: 600; color: #555; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card form-card p-5">
                    <h2 class="mb-4 text-center">Log a New Scrap</h2>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="mt-4 d-grid">
                            <button type="submit" class="btn btn-primary">Save to Memory</button>
                            <a href="{% url 'scrap_list' %}" class="btn btn-link text-muted mt-2">Back to List</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
