<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoLog | {% if edit_mode %}Edit_Entry{% else %}New_Entry{% endif %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: rgba(30, 41, 59, 0.4);
            --accent-neon: #38bdf8;
            --text-main: #f1f5f9;
        }

        body { 
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 100%, #1e293b 0%, #020617 100%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .form-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 3rem;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h2 { color: var(--accent-neon); font-weight: 700; letter-spacing: -1px; }

        /* Styling the Django Form Inputs */
        label { 
            font-family: 'Fira Code', monospace; 
            font-size: 0.8rem; 
            color: #94a3b8; 
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
        }

        input, textarea, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            padding: 12px 16px !important;
            color: white !important;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-neon) !important;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2) !important;
            outline: none;
        }

        .btn-neon {
            background: var(--accent-neon);
            color: #020617;
            font-weight: 700;
            border: none;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            transition: 0.3s;
        }

        .btn-neon:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.5);
            background: #7dd3fc;
        }

        .cancel-link {
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .cancel-link:hover { color: var(--text-main); }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="form-card">
                    <div class="text-center mb-5">
                        <h2>{% if edit_mode %}EDIT_LOG{% else %}NEW_LOG{% endif %}</h2>
                        <p class="text-muted small font-monospace">> sector: {{ scrap.project_tag|default:"global" }}</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        
                        {{ form.as_p }}

                        <button type="submit" class="btn btn-neon mt-4">
                            {% if edit_mode %}UPDATE_PARAMETERS{% else %}EXECUTE_SAVE{% endif %}
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="/" class="cancel-link font-monospace">_abort_mission</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
